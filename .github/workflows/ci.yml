name: AI Manager CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Security and Quality Checks
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run Bandit security linter
      run: |
        pip install bandit[toml]
        bandit -r src/ -f json -o bandit-report.json || true
        
    - name: Upload security artifacts
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          trivy-results.sarif
          bandit-report.json

  # Code Quality and Linting
  quality-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: Run Black formatter check
      run: black --check --diff src/ tests/
      
    - name: Run isort import check
      run: isort --check-only --diff src/ tests/
      
    - name: Run flake8 linting
      run: flake8 src/ tests/ --max-line-length=88 --extend-ignore=E203,W503
      
    - name: Run mypy type checking
      run: mypy src/ --ignore-missing-imports
      
    - name: Run pylint analysis
      run: pylint src/ --disable=C0114,C0116 --fail-under=8.0

  # Comprehensive Testing Suite
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
          
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install -e .
        
    - name: Set up test environment
      run: |
        cp .env.example .env.test
        echo "DATABASE_URL=sqlite:///./test.db" >> .env.test
        echo "TESTING=true" >> .env.test
        
    - name: Run unit tests
      env:
        DATABASE_URL: sqlite:///./test.db
      run: |
        pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=html
        
    - name: Run integration tests
      env:
        DATABASE_URL: sqlite:///./test.db
      run: |
        pytest tests/integration/ -v --timeout=300
        
    - name: Run system tests
      env:
        DATABASE_URL: sqlite:///./test.db
      run: |
        pytest tests/test_real_world_system.py -v --timeout=600
        
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}
        
    - name: Upload test artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          htmlcov/
          pytest-report.html

  # Build and Test Docker Images
  build-docker:
    runs-on: ubuntu-latest
    needs: [security-scan, quality-checks, test]
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Output image
      id: image
      run: |
        echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  # Performance and Load Testing
  performance-test:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install performance testing tools
      run: |
        pip install locust pytest-benchmark
        
    - name: Run Docker container for testing
      run: |
        docker run -d --name ai-manager-test \
          -p 8000:8000 \
          --env-file .env.example \
          ${{ needs.build-docker.outputs.image }}
          
    - name: Wait for service to be ready
      run: |
        timeout 60s bash -c 'until curl -f http://localhost:8000/health; do sleep 2; done'
        
    - name: Run performance benchmarks
      run: |
        python -m pytest tests/performance/ -v --benchmark-json=benchmark.json
        
    - name: Run load tests
      run: |
        locust -f tests/load_test.py --host=http://localhost:8000 \
          --users=50 --spawn-rate=5 --run-time=60s --headless \
          --html=load-test-report.html
          
    - name: Upload performance artifacts
      uses: actions/upload-artifact@v3
      with:
        name: performance-reports
        path: |
          benchmark.json
          load-test-report.html
          
    - name: Stop test container
      if: always()
      run: docker stop ai-manager-test || true

  # Staging Deployment
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-docker, performance-test]
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://ai-manager-staging.yourdomain.com
    steps:
    - uses: actions/checkout@v4
      
    - name: Deploy to staging
      run: |
        echo "Deploying ${{ needs.build-docker.outputs.image }} to staging..."
        # Add your staging deployment logic here
        # This could be:
        # - Kubernetes deployment
        # - Docker Compose update
        # - Cloud provider deployment (AWS ECS, Google Cloud Run, etc.)
        
    - name: Run smoke tests
      run: |
        # Add smoke tests for staging environment
        echo "Running staging smoke tests..."
        
    - name: Notify deployment
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # Production Deployment (Manual Approval Required)
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-docker, deploy-staging]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://ai-manager.yourdomain.com
    steps:
    - uses: actions/checkout@v4
      
    - name: Deploy to production
      run: |
        echo "Deploying ${{ needs.build-docker.outputs.image }} to production..."
        # Add your production deployment logic here
        
    - name: Run production health checks
      run: |
        # Add comprehensive health checks
        echo "Running production health checks..."
        
    - name: Update deployment tracking
      run: |
        # Track deployment metrics, create release notes, etc.
        echo "Deployment completed successfully"
        
    - name: Notify production deployment
      uses: 8398a7/action-slack@v3
      with:
        status: 'success'
        channel: '#production'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        text: "🚀 AI Manager deployed to production successfully!"
