apiVersion: v1
kind: Secret
metadata:
  name: ai-manager-secrets
  namespace: ai-manager
  labels:
    app: ai-manager
type: Opaque
stringData:
  # Database credentials
  postgres-password: "your-secure-postgres-password"
  database-url: "postgresql://ai_manager:your-secure-postgres-password@ai-manager-postgres:5432/ai_manager_db"
  
  # Redis credentials
  redis-password: "your-secure-redis-password"
  redis-url: "redis://:your-secure-redis-password@ai-manager-redis:6379/0"
  
  # Application secrets
  secret-key: "your-super-secret-application-key"
  jwt-secret-key: "your-jwt-secret-key"
  
  # AI Provider API Keys (Use External Secrets Operator in production)
  openai-api-key: "sk-your-openai-api-key"
  anthropic-api-key: "sk-ant-your-anthropic-api-key"
  
  # Monitoring passwords
  grafana-password: "your-secure-grafana-password"
  
  # Backup configuration
  aws-access-key-id: "your-aws-access-key"
  aws-secret-access-key: "your-aws-secret-key"
  backup-s3-bucket: "ai-manager-backups-prod"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-manager-config
  namespace: ai-manager
  labels:
    app: ai-manager
data:
  # Application configuration
  ENVIRONMENT: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  
  # Database configuration
  DB_POOL_SIZE: "20"
  DB_MAX_OVERFLOW: "30"
  
  # Cache configuration
  CACHE_TTL: "3600"
  
  # Worker configuration
  WORKER_CONCURRENCY: "4"
  WORKER_TIMEOUT: "3600"
  WORKER_MEMORY_LIMIT: "4GB"
  MAX_CONCURRENT_TASKS: "10"
  
  # Rate limiting
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
  
  # File storage
  UPLOAD_MAX_SIZE: "100MB"
  ARTIFACTS_RETENTION_DAYS: "30"
  
  # Monitoring
  PROMETHEUS_ENABLED: "true"
  HEALTH_CHECK_INTERVAL: "30"
  
  # Performance tuning
  UVICORN_WORKERS: "4"
  UVICORN_WORKER_CLASS: "uvicorn.workers.UvicornWorker"
  UVICORN_MAX_REQUESTS: "10000"
  UVICORN_MAX_REQUESTS_JITTER: "1000"