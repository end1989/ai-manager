apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ai-manager-postgres
  namespace: ai-manager
  labels:
    app: ai-manager-postgres
    component: database
spec:
  serviceName: ai-manager-postgres
  replicas: 1
  selector:
    matchLabels:
      app: ai-manager-postgres
  template:
    metadata:
      labels:
        app: ai-manager-postgres
        component: database
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: ai_manager_db
        - name: POSTGRES_USER
          value: ai_manager
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ai-manager-secrets
              key: postgres-password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: postgres-init
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 4Gi
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - ai_manager
            - -d
            - ai_manager_db
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - ai_manager
            - -d
            - ai_manager_db
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-init
        configMap:
          name: postgres-init-scripts
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "fast-ssd"
      resources:
        requests:
          storage: 100Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ai-manager-postgres
  namespace: ai-manager
  labels:
    app: ai-manager-postgres
    component: database
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  selector:
    app: ai-manager-postgres

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: ai-manager
data:
  init.sql: |
    -- AI Manager Database Initialization
    
    -- Create extensions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";
    
    -- Create indexes for performance
    -- (These will be created by SQLModel migrations, but included for completeness)
    
    -- Grant permissions
    GRANT ALL PRIVILEGES ON DATABASE ai_manager_db TO ai_manager;
    
    -- Performance tuning
    ALTER SYSTEM SET shared_buffers = '256MB';
    ALTER SYSTEM SET effective_cache_size = '2GB';
    ALTER SYSTEM SET maintenance_work_mem = '64MB';
    ALTER SYSTEM SET checkpoint_completion_target = 0.9;
    ALTER SYSTEM SET wal_buffers = '16MB';
    ALTER SYSTEM SET default_statistics_target = 100;
    ALTER SYSTEM SET random_page_cost = 1.1;
    ALTER SYSTEM SET effective_io_concurrency = 200;